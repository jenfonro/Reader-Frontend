<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=0,minimal-ui,viewport-fit=cover" />
    <meta name="keyword" content="阅读3,在线版">
    <meta name="description" content="">
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="format-detection" content="telephone=no,email=no,address=no">
    <meta name="renderer" content="webkit">
    <meta name="HandheldFriendly" content="true">
    <meta name="MobileOptimized" content="320">
    <meta name="screen-orientation" content="portrait">
    <meta name="x5-orientation" content="portrait">
    <meta name="full-screen" content="yes">
    <meta name="x5-fullscreen" content="true">
    <meta name="browsermode" content="application">
    <meta name="x5-page-mode" content="app">
    <meta name="msapplication-tap-highlight" content="no">
    <title>阅读</title>
  </head>
  <style>
    :root {
      --reader-app-bg: #f7f8fb;
      --reader-app-bg-rgb: 247, 248, 251;
      --reader-app-text: #2c3e50;
      --reader-app-muted: rgba(44, 62, 80, 0.62);
      --reader-app-line: rgba(60, 60, 67, 0.16);
      --reader-app-accent: #007aff;
      --sat: constant(safe-area-inset-top);
      --sat: env(safe-area-inset-top);
      --sar: constant(safe-area-inset-right);
      --sar: env(safe-area-inset-right);
      --sab: constant(safe-area-inset-bottom);
      --sab: env(safe-area-inset-bottom);
      --sal: constant(safe-area-inset-left);
      --sal: env(safe-area-inset-left);
    }
    body::-webkit-scrollbar {
      display: none;
    }
    html,body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--reader-app-bg);
      color: var(--reader-app-text);
    }
  </style>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
